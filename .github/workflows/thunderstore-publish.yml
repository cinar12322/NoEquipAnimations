name: Thunderstore Publish
on:
  push:
    tags:
      - 'v*'
jobs:
  build-and-publish:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '7.x'
      - name: Build solution
        run: dotnet build "ultrakill no unequip animation mod.csproj" --configuration Release
      - name: Create zip package
        run: |
          powershell -Command "Compress-Archive -Path manifest.json, icon.png, README.md, bin/Release/*.dll -DestinationPath NoEquipAnimation-${{ github.ref_name }}.zip"
      - name: Install Thunderstore CLI
        run: dotnet tool install -g ThunderstoreCLI
      - name: Publish to Thunderstore
        env:
          THUNDERSTORE_TOKEN: ${{ secrets.THUNDERSTORE_TOKEN }}
        run: |
          tcli publish --file NoEquipAnimation-${{ github.ref_name }}.zip --package-namespace cinar12322 --package-name NoEquipAnimation --package-version ${{ github.ref_name }} --token $THUNDERSTORE_TOKEN
